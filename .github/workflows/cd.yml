name: CD Pipeline (Despliegue a Producción)

on:
  push:
    branches: [ "main" ]

jobs:
  # Terraform Actions for release
  terraform-release:
    name: Liberación de Infraestructura (Terraform)
    runs-on: ubuntu-latest
    # El uso de 'environments' en GitHub maneja la separación de configs/secretos
    environment: production 
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Apply
        env:
          # El token se inyectaría desde los secretos del entorno 'production'
          TF_VAR_api_token: ${{ secrets.TF_API_TOKEN }}
        # Se usa auto-approve porque es un pipeline de CD automatizado post-merge
        run: terraform apply -auto-approve

  # A CD pipeline must deploy to gateway on merge to main
  deploy-api-gateway:
    name: Despliegue en API Gateway
    runs-on: ubuntu-latest
    needs: terraform-release # Asegura que la infra esté lista antes de desplegar la API
    environment: production
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Simular Despliegue con Gateway CLI
        run: |
          echo "Iniciando despliegue en el API Gateway..."
          echo "Leyendo especificaciones desde specs/api.yaml"
          
          # Separate configs for dev/staging/production
          echo "Aplicando políticas y configuración para el entorno: PRODUCTION"
          
          # Aquí iría el comando real de la CLI de tu Gateway. Ej:
          # gateway-cli deploy --env production --spec specs/api.yaml
          echo "✅ Despliegue completado con éxito."
